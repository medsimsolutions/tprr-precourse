<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPRR — Resus Equipment Practice</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{--navy:#0f1f3d;--teal:#00c896;--teal2:#00a87e;--teal-bg:#e6f9f4;--coral:#e8472a;--coral-bg:#fdf0ed;--amber:#f5a623;--amber-bg:#fef8ec;--slate:#f1f4f8;--border:#dde3ec;--text:#0f1f3d;--muted:#64748b;--white:#fff;--r:12px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--slate);color:var(--text);max-width:440px;margin:0 auto;padding:12px;-webkit-font-smoothing:antialiased;}
#topbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
#topbar .logo{width:32px;height:32px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#topbar .logo svg{width:18px;height:18px;}
#topbar h1{font-size:14px;font-weight:800;color:var(--navy);line-height:1.2;}
#topbar p{font-size:10px;color:var(--muted);}

/* SCENARIO BAR */
#sc-bar{background:var(--navy);border-radius:var(--r);padding:13px 14px;margin-bottom:10px;}
.sc-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.sc-patient{flex-shrink:0;}
.sc-info h3{font-size:13px;font-weight:700;color:white;margin-bottom:3px;line-height:1.3;}
.sc-info p{font-size:11px;color:rgba(255,255,255,.6);line-height:1.5;}
.sc-vitals{display:flex;gap:5px;flex-wrap:wrap;}
.vc{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.vc.crit{background:rgba(232,93,58,.4);color:#fca5a5;}
.vc.warn{background:rgba(245,166,35,.3);color:#fed7aa;}
.vc.ok{background:rgba(0,200,150,.2);color:#6ee7b7;}

/* PATIENT DISPLAY */
#patient-display{background:white;border-radius:var(--r);border:1px solid var(--border);padding:12px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
#patient-svg-wrap{flex-shrink:0;width:80px;}
#applied-list{flex:1;}
.al-title{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.al-item{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--teal2);margin-bottom:5px;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.al-item svg{width:16px;height:16px;flex-shrink:0;}

/* PHASES */
#phases{display:flex;gap:5px;margin-bottom:10px;}
.ph{flex:1;border-radius:20px;padding:5px 6px;text-align:center;font-size:10px;font-weight:700;border:1.5px solid var(--border);color:var(--muted);background:white;transition:all .3s;}
.ph.active{border-color:var(--teal);color:var(--teal);}
.ph.done{background:var(--teal);border-color:var(--teal);color:white;}

/* PROGRESS */
#prog-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
#prog-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
#prog-fill{height:5px;background:linear-gradient(90deg,var(--teal2),var(--teal));border-radius:3px;transition:width .4s;}
#prog-txt{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:600;}

/* DROP GRID */
#drop-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.ds{background:white;border:2px dashed var(--border);border-radius:var(--rs);padding:10px 6px;text-align:center;min-height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:all .2s;cursor:default;}
.ds.hl{border-color:var(--teal);background:var(--teal-bg);}
.ds.correct{border-style:solid;border-color:var(--teal);background:var(--teal-bg);}
.ds.wrong{border-color:var(--coral);background:var(--coral-bg);animation:shk .35s;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.ds-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.ds-label{font-size:10px;color:var(--muted);line-height:1.3;font-weight:500;}
.ds.correct .ds-label{color:#065f46;font-weight:700;}

/* FEEDBACK */
#fb{min-height:40px;border-radius:var(--rs);padding:10px 13px;font-size:12px;line-height:1.6;margin-bottom:10px;display:none;}
#fb.show.ok{display:block;background:var(--teal-bg);border-left:3px solid var(--teal);color:#064e3b;}
#fb.show.no{display:block;background:var(--coral-bg);border-left:3px solid var(--coral);color:#9a3412;}

/* EQUIPMENT TRAY */
#eq-tray{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;}
.eq{background:white;border:1px solid var(--border);border-radius:var(--rs);padding:10px 6px;text-align:center;cursor:grab;user-select:none;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px;touch-action:none;-webkit-tap-highlight-color:transparent;}
.eq:active{transform:scale(1.06);box-shadow:0 6px 18px rgba(0,0,0,.12);}
.eq.used{opacity:.2;pointer-events:none;}
.eq-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;}
.eq-name{font-size:10px;color:var(--muted);line-height:1.35;font-weight:500;}

/* SCENARIO SELECT */
#sc-select{display:none;background:white;border-radius:var(--r);border:1px solid var(--border);padding:14px;margin-bottom:10px;}
#sc-select h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--navy);}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.sc-opt{border:1px solid var(--border);border-radius:var(--rs);padding:10px 8px;cursor:pointer;transition:border-color .2s,background .2s;text-align:center;}
.sc-opt:hover{border-color:var(--teal);background:var(--teal-bg);}
.sc-opt-pat{display:flex;justify-content:center;margin-bottom:6px;}
.sc-opt h4{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;}
.sc-opt p{font-size:10px;color:var(--muted);line-height:1.4;}

/* WIN */
#win-panel{display:none;background:white;border-radius:var(--r);border:1px solid var(--border);padding:20px;text-align:center;}
#win-panel h3{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:6px;}
#win-panel p{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:14px;}
#win-panel .reset-btn{width:100%;padding:12px;background:var(--teal);color:white;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;}
#win-panel .change-btn{width:100%;padding:10px;background:var(--slate);color:var(--muted);border:1px solid var(--border);border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;}

/* GHOST */
.ghost{position:fixed;pointer-events:none;z-index:9999;background:white;border:2px solid var(--teal);border-radius:var(--rs);padding:9px 7px;text-align:center;width:86px;display:none;flex-direction:column;align-items:center;gap:4px;box-shadow:0 6px 20px rgba(0,0,0,.15);}
.ghost .eq-icon{width:28px;height:28px;}
.ghost .eq-name{font-size:10px;color:var(--muted);}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M3 12h3l2-7 4 14 3-9 2 4h4"/></svg></div>
  <div><h1>Tiny Patient Resus Ready</h1><p>Resus equipment practice — Med Sim Solutions</p></div>
</div>

<div id="sc-bar">
  <div class="sc-row">
    <div class="sc-patient" id="sc-thumb"></div>
    <div class="sc-info"><h3 id="sc-title"></h3><p id="sc-desc"></p></div>
  </div>
  <div class="sc-vitals" id="sc-vitals"></div>
</div>

<div id="patient-display">
  <div id="patient-svg-wrap"></div>
  <div id="applied-list"><div class="al-title">Applied so far</div><div id="applied-items"><span style="font-size:11px;color:var(--muted);font-style:italic;">Nothing yet — start dragging</span></div></div>
</div>

<div id="phases">
  <div class="ph" id="ph0">Airway & CPR</div>
  <div class="ph" id="ph1">Access & Drugs</div>
  <div class="ph" id="ph2">Rhythm</div>
</div>

<div id="prog-row">
  <div id="prog-track"><div id="prog-fill" style="width:0%"></div></div>
  <span id="prog-txt">0 / 6</span>
</div>

<div id="drop-grid"></div>
<div id="fb"></div>
<div id="eq-tray"></div>

<div id="win-panel">
  <div style="font-size:40px;margin-bottom:8px;">✅</div>
  <h3>Resuscitation priorities correct</h3>
  <p id="win-summary"></p>
  <button class="reset-btn" onclick="resetCurrent()">Try this scenario again</button>
  <button class="change-btn" onclick="showScenarioSelect()">Change scenario</button>
</div>

<div id="sc-select">
  <h3>Choose a scenario</h3>
  <div class="sc-grid" id="sc-grid"></div>
</div>

<div class="ghost" id="ghost">
  <div class="eq-icon" id="g-icon"></div>
  <div class="eq-name" id="g-name"></div>
</div>

<script>
// ── SVG HELPERS ──
function patientSVG(skin,hair,gender,size){
  const w=size||80,h=size?size*1.35:108;
  const isFemale=gender==='f';
  // Detailed illustrated patient SVG
  return `<svg width="${w}" height="${h}" viewBox="0 0 80 108" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- trolley/bed suggestion -->
    <rect x="4" y="90" width="72" height="6" rx="2" fill="#cbd5e1"/>
    <rect x="0" y="94" width="80" height="3" rx="1.5" fill="#94a3b8"/>
    <!-- legs -->
    <rect x="22" y="68" width="13" height="26" rx="6" fill="${skin}"/>
    <rect x="45" y="68" width="13" height="26" rx="6" fill="${skin}"/>
    <!-- shoes/feet -->
    <ellipse cx="28" cy="94" rx="8" ry="4" fill="${skin}" opacity=".7"/>
    <ellipse cx="52" cy="94" rx="8" ry="4" fill="${skin}" opacity=".7"/>
    <!-- body/torso -->
    <rect x="18" y="30" width="44" height="42" rx="10" fill="${skin}"/>
    <!-- arms -->
    <rect x="4" y="33" width="14" height="30" rx="7" fill="${skin}"/>
    <rect x="62" y="33" width="14" height="30" rx="7" fill="${skin}"/>
    <!-- hands -->
    <ellipse cx="11" cy="64" rx="7" ry="5" fill="${skin}"/>
    <ellipse cx="69" cy="64" rx="7" ry="5" fill="${skin}"/>
    <!-- neck -->
    <rect x="33" y="22" width="14" height="12" rx="5" fill="${skin}"/>
    <!-- head -->
    <ellipse cx="40" cy="16" rx="16" ry="17" fill="${skin}"/>
    <!-- hair -->
    ${isFemale
      ? `<ellipse cx="40" cy="7" rx="15" ry="9" fill="${hair}"/>
         <path d="M24 13 Q20 20 22 28" stroke="${hair}" stroke-width="4" stroke-linecap="round" fill="none"/>
         <path d="M56 13 Q60 20 58 28" stroke="${hair}" stroke-width="4" stroke-linecap="round" fill="none"/>
         <path d="M25 10 Q28 4 40 3 Q52 4 55 10" fill="${hair}"/>`
      : `<ellipse cx="40" cy="7" rx="14" ry="7" fill="${hair}"/>
         <path d="M26 14 Q24 10 26 7 Q32 2 40 2 Q48 2 54 7 Q56 10 54 14" fill="${hair}"/>`
    }
    <!-- ears -->
    <ellipse cx="24" cy="17" rx="3.5" ry="4.5" fill="${skin}"/>
    <ellipse cx="56" cy="17" rx="3.5" ry="4.5" fill="${skin}"/>
    <!-- eyes — closed/neutral, not smiling -->
    <path d="M33 17 Q35 15.5 37 17" stroke="#2d1b0e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M43 17 Q45 15.5 47 17" stroke="#2d1b0e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- nose -->
    <path d="M39 19 Q38 22 40 22.5 Q42 22 41 19" stroke="#2d1b0e" stroke-width="1.2" stroke-linecap="round" fill="none" opacity=".6"/>
    <!-- mouth — straight/neutral, no smile -->
    <path d="M36 25.5 Q40 25.5 44 25.5" stroke="#2d1b0e" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    ${isFemale
      ? `<!-- subtle clothing suggestion -->
         <path d="M18 44 Q22 42 28 43" stroke="rgba(255,255,255,.3)" stroke-width="1.5" fill="none"/>
         <path d="M62 44 Q58 42 52 43" stroke="rgba(255,255,255,.3)" stroke-width="1.5" fill="none"/>`
      : ``
    }
    <!-- monitoring pads placeholder (faint) -->
    <rect x="24" y="38" width="10" height="7" rx="2" fill="rgba(0,200,150,.12)" stroke="rgba(0,200,150,.3)" stroke-width="1"/>
    <rect x="46" y="38" width="10" height="7" rx="2" fill="rgba(0,200,150,.12)" stroke="rgba(0,200,150,.3)" stroke-width="1"/>
  </svg>`;
}

function thumbSVG(skin,hair,gender){
  const isFemale=gender==='f';
  return `<svg width="34" height="34" viewBox="0 0 34 34" fill="none">
    <circle cx="17" cy="17" r="16" fill="${skin}"/>
    ${isFemale
      ? `<ellipse cx="17" cy="9" rx="12" ry="7" fill="${hair}"/><path d="M5 16 Q4 12 6 10" stroke="${hair}" stroke-width="3" stroke-linecap="round" fill="none"/><path d="M29 16 Q30 12 28 10" stroke="${hair}" stroke-width="3" stroke-linecap="round" fill="none"/>`
      : `<ellipse cx="17" cy="9" rx="11" ry="6" fill="${hair}"/>`
    }
    <path d="M12 18 Q14 16 16 18" stroke="#2d1b0e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M18 18 Q20 16 22 18" stroke="#2d1b0e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M14 22 Q17 22 20 22" stroke="#2d1b0e" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  </svg>`;
}

// ── EQUIPMENT SVG ICONS ──
const EQ_ICONS={
  cpr:`<svg viewBox="0 0 34 34" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- hands performing compressions -->
    <rect x="10" y="18" width="14" height="9" rx="3" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
    <rect x="12" y="13" width="10" height="7" rx="3" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1.5"/>
    <!-- arrow down indicating compression -->
    <path d="M17 7 L17 12" stroke="#4f46e5" stroke-width="1.5"/>
    <path d="M14 10 L17 13 L20 10" stroke="#4f46e5" stroke-width="1.5" fill="none"/>
    <!-- sternum indicator -->
    <line x1="13" y1="27" x2="21" y2="27" stroke="#818cf8" stroke-width="1.2" stroke-dasharray="2,1"/>
  </svg>`,
  bvm:`<svg viewBox="0 0 34 34" fill="none" stroke-linecap="round">
    <!-- mask face shape -->
    <path d="M8 20 Q8 26 17 26 Q26 26 26 20 L24 14 Q20 12 17 12 Q14 12 10 14 Z" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
    <!-- bag/reservoir -->
    <ellipse cx="17" cy="8" rx="7" ry="5" fill="#93c5fd" stroke="#2563eb" stroke-width="1.5"/>
    <!-- connector -->
    <line x1="17" y1="13" x2="17" y2="12" stroke="#2563eb" stroke-width="2"/>
    <!-- valve dots -->
    <circle cx="13" cy="19" r="1.5" fill="#2563eb"/>
    <circle cx="21" cy="19" r="1.5" fill="#2563eb"/>
    <circle cx="17" cy="22" r="1.5" fill="#2563eb"/>
  </svg>`,
  monitor:`<svg viewBox="0 0 34 34" fill="none" stroke-linecap="round">
    <!-- monitor body -->
    <rect x="4" y="7" width="26" height="18" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- ECG line -->
    <polyline points="6,16 9,16 11,11 13,21 15,16 19,16 21,13 23,19 25,16 28,16" stroke="#00c896" stroke-width="1.8" fill="none"/>
    <!-- stand -->
    <rect x="14" y="25" width="6" height="3" rx="1" fill="#475569"/>
    <rect x="11" y="27" width="12" height="2" rx="1" fill="#334155"/>
  </svg>`,
  io:`<svg viewBox="0 0 34 34" fill="none" stroke-linecap="round">
    <!-- tibia bone simplified -->
    <path d="M20 28 Q22 24 21 18 Q20 14 18 12 Q17 10 16 10 Q14 10 14 12 Q13 16 14 22 Q14 26 16 28 Z" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
    <!-- IO needle -->
    <line x1="11" y1="8" x2="20" y2="20" stroke="#dc2626" stroke-width="2.5"/>
    <polygon points="19,18 22,22 17,21" fill="#dc2626"/>
    <!-- needle hub -->
    <rect x="8" y="5" width="6" height="5" rx="1.5" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
    <!-- confirmation flash -->
    <circle cx="22" cy="22" r="3" fill="rgba(0,200,150,.2)" stroke="#00c896" stroke-width="1.2"/>
  </svg>`,
  adrenaline:`<svg viewBox="0 0 34 34" fill="none" stroke-linecap="round">
    <!-- syringe body -->
    <rect x="8" y="14" width="18" height="8" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <!-- plunger -->
    <rect x="6" y="15" width="4" height="6" rx="1" fill="#f59e0b" stroke="#d97706" stroke-width="1.2"/>
    <!-- needle -->
    <line x1="26" y1="18" x2="31" y2="18" stroke="#94a3b8" stroke-width="2"/>
    <polygon points="29,16 32,18 29,20" fill="#94a3b8"/>
    <!-- drug indicator lines -->
    <line x1="14" y1="14" x2="14" y2="22" stroke="#fbbf24" stroke-width="1" opacity=".5"/>
    <line x1="18" y1="14" x2="18" y2="22" stroke="#fbbf24" stroke-width="1" opacity=".5"/>
    <line x1="22" y1="14" x2="22" y2="22" stroke="#fbbf24" stroke-width="1" opacity=".5"/>
    <!-- label -->
    <text x="17" y="20" text-anchor="middle" font-size="5" font-weight="700" fill="#92400e">ADR</text>
  </svg>`,
  defib:`<svg viewBox="0 0 34 34" fill="none" stroke-linecap="round">
    <!-- defibrillator body -->
    <rect x="4" y="8" width="20" height="16" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- screen -->
    <rect x="7" y="11" width="10" height="8" rx="1.5" fill="#0f172a"/>
    <!-- ECG on screen -->
    <polyline points="8,15 9.5,15 10.5,12 11.5,18 12.5,15 16,15" stroke="#00c896" stroke-width="1.2" fill="none"/>
    <!-- shock button -->
    <circle cx="21.5" cy="15" r="3.5" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.2"/>
    <path d="M20.5 15 L21.5 13 L22.5 15" stroke="#92400e" stroke-width="1" fill="none"/>
    <!-- bolt symbol -->
    <path d="M21 14 L20.2 15.5 L21.5 15.5 L20.7 17" stroke="#92400e" stroke-width="1.2" stroke-linecap="round"/>
    <!-- pads cables -->
    <path d="M6 24 Q6 29 10 29 Q12 29 12 27" stroke="#64748b" stroke-width="1.5" fill="none"/>
    <rect x="8" y="26" width="6" height="4" rx="2" fill="#334155"/>
    <path d="M18 24 Q18 29 22 29 Q24 29 24 27" stroke="#64748b" stroke-width="1.5" fill="none"/>
    <rect x="20" y="26" width="6" height="4" rx="2" fill="#334155"/>
  </svg>`,
  suction:`<svg viewBox="0 0 34 34" fill="none" stroke-linecap="round">
    <!-- suction device body -->
    <rect x="4" y="16" width="14" height="10" rx="3" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
    <!-- tubing -->
    <path d="M18 21 Q22 21 24 18 Q26 15 28 13" stroke="#7dd3fc" stroke-width="2" fill="none"/>
    <!-- catheter tip -->
    <ellipse cx="28" cy="12" rx="3" ry="2" fill="#bae6fd" stroke="#0284c7" stroke-width="1.2"/>
    <line x1="26" y1="11" x2="30" y2="11" stroke="#0284c7" stroke-width="1"/>
    <line x1="26" y1="13" x2="30" y2="13" stroke="#0284c7" stroke-width="1"/>
    <!-- vacuum indicator -->
    <circle cx="10" cy="21" r="3" fill="white" stroke="#0284c7" stroke-width="1"/>
    <path d="M9 21 L10 19 L11 21" stroke="#0284c7" stroke-width="1" fill="none"/>
  </svg>`,
  fluids:`<svg viewBox="0 0 34 34" fill="none" stroke-linecap="round">
    <!-- IV bag -->
    <path d="M11 6 Q11 4 17 4 Q23 4 23 6 L25 22 Q25 27 17 27 Q9 27 9 22 Z" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
    <!-- fluid level -->
    <path d="M10 18 Q10 22 17 22 Q24 22 24 18" fill="#bae6fd" opacity=".7"/>
    <!-- NS label -->
    <text x="17" y="16" text-anchor="middle" font-size="5.5" font-weight="700" fill="#0e7490">0.9%</text>
    <text x="17" y="22" text-anchor="middle" font-size="4.5" fill="#0e7490">NaCl</text>
    <!-- drip chamber -->
    <rect x="15" y="27" width="4" height="5" rx="1" fill="#cffafe" stroke="#0891b2" stroke-width="1"/>
    <!-- tubing -->
    <line x1="17" y1="32" x2="17" y2="34" stroke="#0891b2" stroke-width="1.5"/>
    <!-- hanger hole -->
    <circle cx="17" cy="5" r="2" fill="none" stroke="#0891b2" stroke-width="1.2"/>
  </svg>`,
  glucose:`<svg viewBox="0 0 34 34" fill="none" stroke-linecap="round">
    <!-- glucometer body -->
    <rect x="8" y="10" width="18" height="18" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
    <!-- screen -->
    <rect x="11" y="13" width="10" height="7" rx="1.5" fill="#fefce8" stroke="#fbbf24" stroke-width="1"/>
    <!-- reading -->
    <text x="16" y="19" text-anchor="middle" font-size="6" font-weight="800" fill="#92400e">BSL</text>
    <!-- test strip -->
    <rect x="22" y="20" width="7" height="3" rx="1" fill="#fed7aa" stroke="#f97316" stroke-width="1"/>
    <line x1="25" y1="20" x2="25" y2="23" stroke="#f97316" stroke-width="1"/>
    <!-- blood drop symbol -->
    <path d="M16 5 Q16 3 17 3 Q18 3 18 5 Q18 8 17 8 Q16 8 16 5Z" fill="#ef4444" stroke="#dc2626" stroke-width=".5"/>
  </svg>`
};

const SLOT_ICONS={
  bvm:`<svg viewBox="0 0 32 32" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"><path d="M7 19 Q7 24 16 24 Q25 24 25 19 L23 13 Q19 11 16 11 Q13 11 9 13Z" fill="none"/><ellipse cx="16" cy="7" rx="6" ry="4" fill="none"/><line x1="16" y1="11" x2="16" y2="10"/></svg>`,
  cpr:`<svg viewBox="0 0 32 32" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"><rect x="9" y="17" width="14" height="9" rx="3" fill="none"/><rect x="11" y="12" width="10" height="7" rx="3" fill="none"/><path d="M16 6 L16 11"/></svg>`,
  monitor:`<svg viewBox="0 0 32 32" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"><rect x="4" y="7" width="24" height="16" rx="3" fill="none"/><polyline points="6,15 9,15 11,10 13,20 15,15 19,15 21,12 23,18 25,15 28,15" stroke="#94a3b8" stroke-width="1.5" fill="none"/></svg>`,
  io:`<svg viewBox="0 0 32 32" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"><line x1="10" y1="7" x2="19" y2="19"/><path d="M19 17 Q22 20 18 22 Q15 24 14 21"/></svg>`,
  adrenaline:`<svg viewBox="0 0 32 32" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"><rect x="8" y="13" width="16" height="8" rx="2" fill="none"/><rect x="6" y="14" width="4" height="6" rx="1" fill="none"/><line x1="24" y1="17" x2="28" y2="17"/></svg>`,
  defib:`<svg viewBox="0 0 32 32" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"><rect x="4" y="8" width="18" height="14" rx="3" fill="none"/><circle cx="26" cy="14" r="4" fill="none"/><path d="M25 14 L26 12 L27 14" fill="none"/></svg>`
};

const SCENARIOS=[
  {name:"Aria, 3yr",skin:"#C47A2E",hair:"#1a0800",gender:"f",desc:"Unresponsive, no pulse. 10-min collapse at home. 15kg.",vitals:[{l:"Pulse",v:"Absent",c:"crit"},{l:"Resp",v:"Apnoeic",c:"crit"},{l:"SpO₂",v:"—",c:"warn"},{l:"Wt",v:"15kg",c:"ok"}],summary:"Airway and ventilation first — paediatric arrest is asphyxial in origin. 15:2 with two rescuers, two-thumb technique for infant/toddler. IO access when IV fails, adrenaline 0.01mg/kg every 3–5 min. Anterior-posterior pad placement for defibrillation."},
  {name:"Liam, 8mo",skin:"#F2C594",hair:"#7B3F00",gender:"m",desc:"Found unresponsive in cot. Agonal breathing on arrival. ~8kg.",vitals:[{l:"Pulse",v:"Absent",c:"crit"},{l:"Resp",v:"Agonal",c:"crit"},{l:"Wt",v:"~8kg",c:"ok"}],summary:"In an infant: two-thumb encircling technique — consistently greater depth and less fatigue than two-finger. Target 4cm depth (approx ⅓ AP dimension). 15:2 ratio for PBLS-trained providers. BVM: smallest mask from nose bridge to chin cleft."},
  {name:"Tane, 7yr",skin:"#8B4513",hair:"#1C0A00",gender:"m",desc:"Witnessed collapse at school, bystander CPR ongoing. 26kg.",vitals:[{l:"Rhythm",v:"VF",c:"crit"},{l:"Pulse",v:"Absent",c:"crit"},{l:"Wt",v:"~26kg",c:"ok"}],summary:"Witnessed VF arrest: defibrillation is a priority after airway and CPR established. 4J/kg = 104J. Anterior-posterior pad placement for manual defibrillation. Resume CPR immediately after shock — no pulse check. Adrenaline after 2nd shock for refractory VF."},
  {name:"Priya, 5yr",skin:"#A0522D",hair:"#1C0A00",gender:"f",desc:"Anaphylaxis, cardiovascular collapse, IV access failed x2. 18kg.",vitals:[{l:"BP",v:"55/25",c:"crit"},{l:"SpO₂",v:"88%",c:"crit"},{l:"HR",v:"190",c:"crit"},{l:"Wt",v:"18kg",c:"ok"}],summary:"Anaphylaxis with cardiovascular collapse: adrenaline is the priority drug — IM first (0.01mg/kg anterolateral thigh) if no IV/IO. IO access when IV fails in emergency. Fluid resuscitation 20ml/kg NS. Monitor for biphasic reaction."}
];

const SLOTS=[
  {id:"bvm",label:"Airway &\nventilation",phase:0,fb:{ok:"BVM in place. Select mask from bridge of nose to chin cleft. EC clamp grip. Deliver just enough volume for visible chest rise — over-inflation causes gastric distension. 15:2 with two PBLS-trained rescuers.",no:"Airway and ventilation first — paediatric arrest is predominantly asphyxial. Begin with the BVM before anything else."}},
  {id:"cpr",label:"Chest\ncompressions",phase:0,fb:{ok:"CPR started. Infant: two-thumb encircling, 4cm depth. Child: heel of hand, 5cm depth. Rate 100–120/min. Full chest recoil — 50% compression, 50% release. Swap every 2 min.",no:"CPR comes early — but establish your airway first in paediatric arrest. Hypoxia is usually the cause."}},
  {id:"monitor",label:"Cardiac\nmonitor",phase:1,fb:{ok:"Monitor attached. You're looking for shockable (VF/pVT) vs non-shockable (asystole/PEA). This decision drives everything that follows — defibrillation vs adrenaline timing.",no:"Get airway and compressions running before you stop to attach monitoring."}},
  {id:"io",label:"Vascular\naccess",phase:1,fb:{ok:"IO access secured — proximal tibia, 2cm below tibial tuberosity, anteromedial surface. Confirm with saline flush and syringe aspiration. All resuscitation drugs and fluids can be given IO.",no:"IO access is critical — but airway, CPR and monitoring come first."}},
  {id:"adrenaline",label:"First\ndrug",phase:1,fb:{ok:"Adrenaline 0.01mg/kg IV/IO. For non-shockable arrest: give immediately after vascular access confirmed. For VF/pVT: after 2nd shock. Repeat every 3–5 minutes. Flush well after IO administration.",no:"Hold adrenaline until vascular access is confirmed and rhythm is assessed — sequence matters."}},
  {id:"defib",label:"Rhythm &\ndefib",phase:2,fb:{ok:"Rhythm check. If VF or pulseless VT: defibrillate. Manual defibrillator: 4J/kg, anterior-posterior pad placement. Resume CPR immediately after shock — no pulse check. Reassess every 2 minutes.",no:"Rhythm check and defibrillation come after airway, CPR, monitoring and access are established."}}
];

const EQUIPMENT=[
  {id:"bvm",name:"BVM mask\n& bag"},
  {id:"cpr",name:"Chest\ncompressions"},
  {id:"io",name:"IO needle\n(tibial)"},
  {id:"adrenaline",name:"Adrenaline\n0.01mg/kg"},
  {id:"defib",name:"Defibrillator\n+ pads"},
  {id:"monitor",name:"Cardiac\nmonitor/ECG"},
  {id:"suction",name:"Suction\ncatheter"},
  {id:"fluids",name:"NS fluid\n20ml/kg"},
  {id:"glucose",name:"BSL check\n+ glucose"}
];

let score=0,curSc=0,dragId=null,touchEl=null;

function buildUI(){
  const sc=SCENARIOS[curSc];
  document.getElementById('sc-title').textContent=sc.name+' — Paediatric cardiac arrest';
  document.getElementById('sc-desc').textContent=sc.desc;
  document.getElementById('sc-thumb').innerHTML=thumbSVG(sc.skin,sc.hair,sc.gender);
  document.getElementById('patient-svg-wrap').innerHTML=patientSVG(sc.skin,sc.hair,sc.gender);
  document.getElementById('sc-vitals').innerHTML=sc.vitals.map(v=>`<span class="vc ${v.c}">${v.l}: ${v.v}</span>`).join('');
  document.getElementById('applied-items').innerHTML=`<span style="font-size:11px;color:var(--muted);font-style:italic;">Nothing yet — start dragging</span>`;

  // drop grid
  document.getElementById('drop-grid').innerHTML=SLOTS.map(s=>`
    <div class="ds" id="ds-${s.id}" data-accept="${s.id}">
      <div class="ds-icon">${SLOT_ICONS[s.id]}</div>
      <div class="ds-label">${s.label.replace('\n','<br>')}</div>
    </div>`).join('');

  // eq tray
  document.getElementById('eq-tray').innerHTML=EQUIPMENT.map(e=>`
    <div class="eq" id="eq-${e.id}" data-id="${e.id}" draggable="true">
      <div class="eq-icon">${EQ_ICONS[e.id]}</div>
      <div class="eq-name">${e.name.replace('\n','<br>')}</div>
    </div>`).join('');

  score=0; updateProg();
  document.getElementById('ph0').className='ph active';
  document.getElementById('ph1').className='ph';
  document.getElementById('ph2').className='ph';
  hideFb();
  document.getElementById('win-panel').style.display='none';
  document.getElementById('drop-grid').style.display='grid';
  document.getElementById('eq-tray').style.display='grid';
  document.getElementById('sc-select').style.display='none';
  attachEvents();
}

function attachEvents(){
  document.querySelectorAll('.eq').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragId=el.dataset.id;setTimeout(()=>el.style.opacity='.3',0);});
    el.addEventListener('dragend',()=>{el.style.opacity='';dragId=null;});
    el.addEventListener('touchstart',e=>{
      if(el.classList.contains('used'))return;
      touchEl=el;
      const t=e.touches[0];
      const g=document.getElementById('ghost');
      g.querySelector('.eq-icon').innerHTML=EQ_ICONS[el.dataset.id];
      g.querySelector('.eq-name').innerHTML=el.querySelector('.eq-name').innerHTML;
      g.style.display='flex'; moveGhost(t);
      e.preventDefault();
    },{passive:false});
  });
  document.querySelectorAll('.ds').forEach(sl=>{
    sl.addEventListener('dragover',e=>{e.preventDefault();sl.classList.add('hl');});
    sl.addEventListener('dragleave',()=>sl.classList.remove('hl'));
    sl.addEventListener('drop',e=>{e.preventDefault();sl.classList.remove('hl');tryDrop(sl,dragId);dragId=null;});
  });
  document.addEventListener('touchmove',e=>{
    if(!touchEl)return;
    const t=e.touches[0]; moveGhost(t);
    document.querySelectorAll('.ds').forEach(s=>s.classList.remove('hl'));
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const sl=el&&el.closest('.ds'); if(sl)sl.classList.add('hl');
    e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(!touchEl)return;
    document.getElementById('ghost').style.display='none';
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const sl=el&&el.closest('.ds');
    document.querySelectorAll('.ds').forEach(s=>s.classList.remove('hl'));
    if(sl)tryDrop(sl,touchEl.dataset.id);
    touchEl=null;
  },{passive:false});
}

function moveGhost(t){const g=document.getElementById('ghost');g.style.left=(t.clientX-43)+'px';g.style.top=(t.clientY-43)+'px';}

function tryDrop(sl,id){
  if(!sl||!id)return;
  if(sl.classList.contains('correct'))return;
  const accept=sl.dataset.accept;
  const slot=SLOTS.find(s=>s.id===accept); if(!slot)return;
  const eqEl=document.getElementById('eq-'+id);
  if(id===accept){
    sl.classList.add('correct');
    sl.innerHTML=`<div class="ds-icon">${EQ_ICONS[id]}</div><div class="ds-label" style="color:#065f46;font-weight:700">${eqEl.querySelector('.eq-name').innerHTML}</div>`;
    eqEl.classList.add('used');
    score++;
    // add to applied list
    const al=document.getElementById('applied-items');
    if(al.querySelector('span'))al.innerHTML='';
    const item=document.createElement('div'); item.className='al-item';
    item.innerHTML=`<svg viewBox="0 0 16 16" fill="none" stroke="var(--teal)" stroke-width="2.5"><polyline points="2,8 6,12 14,4"/></svg><span>${eqEl.querySelector('.eq-name').textContent.replace('\n',' ')}</span>`;
    al.appendChild(item);
    showFb('ok',slot.fb.ok);
    updateProg();
    if(score===6)setTimeout(showWin,800);
  } else {
    sl.classList.add('wrong'); setTimeout(()=>sl.classList.remove('wrong'),400);
    const s=SLOTS.find(s=>s.id===accept);
    showFb('no',s?s.fb.no:'Try a different piece of equipment for this slot.');
  }
}

function showFb(type,msg){const fb=document.getElementById('fb');fb.className='show '+type;fb.textContent=msg;if(type==='ok')setTimeout(hideFb,5000);}
function hideFb(){const fb=document.getElementById('fb');fb.className='';fb.textContent='';}

function updateProg(){
  document.getElementById('prog-fill').style.width=(score/6*100)+'%';
  document.getElementById('prog-txt').textContent=score+' / 6';
  const doneIds=SLOTS.filter(s=>document.getElementById('ds-'+s.id)?.classList.contains('correct')).map(s=>s.id);
  const ph0done=['bvm','cpr'].every(id=>doneIds.includes(id));
  const ph1done=['monitor','io','adrenaline'].every(id=>doneIds.includes(id));
  const ph2done=['defib'].every(id=>doneIds.includes(id));
  document.getElementById('ph0').className='ph'+(ph0done?' done':' active');
  document.getElementById('ph1').className='ph'+(ph1done?' done':ph0done?' active':'');
  document.getElementById('ph2').className='ph'+(ph2done?' done':ph1done?' active':'');
}

function showWin(){
  document.getElementById('drop-grid').style.display='none';
  document.getElementById('eq-tray').style.display='none';
  hideFb();
  document.getElementById('win-summary').textContent=SCENARIOS[curSc].summary;
  document.getElementById('win-panel').style.display='block';
}

function resetCurrent(){buildUI();}

function showScenarioSelect(){
  document.getElementById('win-panel').style.display='none';
  const sg=document.getElementById('sc-grid');
  sg.innerHTML=SCENARIOS.map((s,i)=>`
    <div class="sc-opt" onclick="loadScenario(${i})">
      <div class="sc-opt-pat">${thumbSVG(s.skin,s.hair,s.gender)}</div>
      <h4>${s.name}</h4>
      <p>${s.desc}</p>
    </div>`).join('');
  document.getElementById('sc-select').style.display='block';
  document.getElementById('drop-grid').style.display='none';
  document.getElementById('eq-tray').style.display='none';
}

function loadScenario(idx){curSc=idx;buildUI();}

buildUI();
</script>
